global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ray-api
    static_configs:
      - targets: ["ray-api:8000"]
    metrics_path: /metrics

  - job_name: ray-worker
    static_configs:
      - targets: ["ray-worker:8001"]
    metrics_path: /metrics
    # Worker doesn't expose metrics yet — scrape will fail gracefully
