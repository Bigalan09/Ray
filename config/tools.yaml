tools:
  - name: calculator
    description: >
      Evaluate mathematical expressions. Supports basic arithmetic
      (+, -, *, /, %), parentheses, and decimal numbers.
    parameters:
      type: object
      properties:
        expression:
          type: string
          description: "The mathematical expression to evaluate (e.g. 2 + 2)"
      required:
        - expression
    enabled: true

  - name: get_current_time
    description: Get the current date and time. Can optionally specify a timezone.
    parameters:
      type: object
      properties:
        timezone:
          type: string
          description: "Optional timezone (e.g. Europe/London, America/New_York)"
    enabled: true

  - name: web_search
    description: >
      Search the web for current information, news, prices, or any topic
      requiring up-to-date data. Returns titles, URLs, and snippets.
    parameters:
      type: object
      properties:
        query:
          type: string
          description: The search query
        max_results:
          type: number
          description: Maximum results to return (default 5)
      required:
        - query
    enabled: true

  - name: memory_search
    description: >
      Search your memory for relevant past context, facts, or preferences
      you have stored. Use this to recall information from previous conversations.
    parameters:
      type: object
      properties:
        query:
          type: string
          description: What to search for in memory
        limit:
          type: number
          description: Maximum results to return (default 5)
      required:
        - query
    enabled: true

  - name: memory_store
    description: >
      Store an important fact, preference, or piece of information in memory
      so it can be recalled in future conversations.
    parameters:
      type: object
      properties:
        content:
          type: string
          description: The information to remember
        tags:
          type: array
          description: Optional tags for categorisation
          items:
            type: string
      required:
        - content
    enabled: true

  - name: update_user_profile
    description: >
      Update the user's profile (USER.md) with a new observation about their
      preferences, workflow, or context. Call this when you learn something
      durable about the user that should persist across all future conversations.
      Do not store ephemeral facts here. Only store lasting preferences.
    parameters:
      type: object
      properties:
        observation:
          type: string
          description: The observation to add (e.g. "Prefers TypeScript over JavaScript")
        section:
          type: string
          description: "Which section to add to (e.g. Communication Style, Work Context, Notes)"
      required:
        - observation
    enabled: true

  - name: document_search
    description: >
      Search through uploaded documents for relevant information.
      Use this when the user asks about content from files they have
      uploaded or when you need to find specific information from
      ingested documents. Returns matching text chunks with source citations.
    parameters:
      type: object
      properties:
        query:
          type: string
          description: What to search for in the document collection
        limit:
          type: number
          description: Maximum results to return (default 5)
      required:
        - query
    enabled: true

  - name: write_file
    description: >
      Write content to a file in the workspace. Use this to create new files
      or overwrite existing ones. Files are scoped to the /workspace directory.
    parameters:
      type: object
      properties:
        filename:
          type: string
          description: "Path relative to workspace (e.g. notes/todo.md)"
        content:
          type: string
          description: The full content to write to the file
      required:
        - filename
        - content
    enabled: true

  - name: read_file
    description: >
      Read the contents of a file from the workspace. Use this to check
      what is already in a file before updating it, or to retrieve saved content.
    parameters:
      type: object
      properties:
        filename:
          type: string
          description: "Path relative to workspace (e.g. notes/todo.md)"
      required:
        - filename
    enabled: true

  - name: list_files
    description: >
      List files and directories in the workspace. Use this to see what
      files exist before reading or writing.
    parameters:
      type: object
      properties:
        directory:
          type: string
          description: "Directory relative to workspace (default: root)"
    enabled: true

  - name: spawn_tasks
    description: >
      Spawn multiple sub-agent tasks to run in parallel. Each task has a
      prompt and an optional agent name. Returns combined results when all
      complete. Use this to decompose complex goals into concurrent work.
    parameters:
      type: object
      properties:
        tasks:
          type: array
          description: List of tasks to run in parallel
          items:
            type: object
            properties:
              prompt:
                type: string
                description: The task prompt
              agent:
                type: string
                description: "Agent to use (default: general)"
            required:
              - prompt
      required:
        - tasks
    enabled: true

  - name: exec_command
    description: >
      Execute an OS shell command (e.g. git, docker, npm). Only commands
      explicitly listed in the exec guardrails allowlist can run, and all
      require user approval before execution. Do NOT use this to call other
      Ray tools (spawn_tasks, web_search, etc.) — call those tools directly.
    parameters:
      type: object
      properties:
        command:
          type: string
          description: "The OS shell command to run (e.g. 'git status', 'npm test'). Must be in the allowlist."
      required:
        - command
    enabled: true

  - name: list_schedules
    description: >
      List all scheduled tasks with their names and next run times.
      Use this to check what recurring tasks are configured.
    parameters:
      type: object
      properties: {}
    enabled: true

  - name: create_schedule
    description: >
      Create a new scheduled task that runs on a cron schedule. The task
      will execute the given prompt as a background agent task at the
      specified times. Cron format: minute hour day-of-month month day-of-week.
    parameters:
      type: object
      properties:
        name:
          type: string
          description: "Short snake_case name for the schedule (e.g. daily_summary)"
        cron:
          type: string
          description: "5-field cron expression (e.g. '0 8 * * 1-5' for weekdays at 8am)"
        prompt:
          type: string
          description: "The prompt to run on each execution"
        agent:
          type: string
          description: "Agent to use (default: general)"
      required:
        - name
        - cron
        - prompt
    enabled: true

  - name: remove_schedule
    description: >
      Remove a scheduled task by name. Use list_schedules first to see
      available schedule names.
    parameters:
      type: object
      properties:
        name:
          type: string
          description: "Name of the schedule to remove"
      required:
        - name
    enabled: true

  - name: web_fetch
    description: >
      Fetch content from a URL and return it as readable text. HTML pages
      are automatically converted to clean text. Use this to read web pages,
      API responses, or any URL content.
    parameters:
      type: object
      properties:
        url:
          type: string
          description: "The URL to fetch (e.g. https://example.com/page)"
        raw:
          type: boolean
          description: "If true, return raw response without HTML-to-text conversion (default: false)"
      required:
        - url
    enabled: true

  - name: grep_files
    description: >
      Search workspace files for lines matching a regular expression.
      Returns matching lines with file paths and line numbers. Use this
      to find specific content across workspace files.
    parameters:
      type: object
      properties:
        pattern:
          type: string
          description: "Regular expression to search for"
        glob:
          type: string
          description: "Glob pattern to filter which files to search (default: **/*)"
        max_results:
          type: number
          description: "Maximum matching lines to return (default: 50, max: 100)"
        context_lines:
          type: number
          description: "Lines of context to show before and after each match (default: 0)"
        case_insensitive:
          type: boolean
          description: "Ignore case when matching (default: false)"
      required:
        - pattern
    enabled: true

  - name: glob_files
    description: >
      Find files in the workspace matching a glob pattern. Returns file
      paths with size and modification time. Use this to discover files
      before reading or searching them.
    parameters:
      type: object
      properties:
        pattern:
          type: string
          description: "Glob pattern (e.g. **/*.md, notes/*.txt, *.json)"
        max_results:
          type: number
          description: "Maximum files to return (default: 200, max: 500)"
      required:
        - pattern
    enabled: true

  - name: ask_user
    description: >
      Ask the user a question when you need clarification before proceeding.
      Can present suggested choices or allow free-text answers. Use this
      instead of guessing when the user's intent is ambiguous.
    parameters:
      type: object
      properties:
        question:
          type: string
          description: "The question to ask"
        options:
          type: array
          description: "Optional list of suggested choices"
          items:
            type: string
        allow_free_text:
          type: boolean
          description: "Whether the user can type a custom answer (default: true)"
      required:
        - question
    enabled: true

  - name: spawn_agent
    description: >
      Spawn a single focused sub-agent to handle a self-contained task.
      The sub-agent runs with its own context and returns the result.
      Use this to delegate work that benefits from a clean context.
      For multiple parallel tasks, use spawn_tasks instead.
    parameters:
      type: object
      properties:
        prompt:
          type: string
          description: "The task prompt for the sub-agent"
        agent:
          type: string
          description: "Agent to use (default: general)"
        description:
          type: string
          description: "Short description of what the sub-agent is doing"
      required:
        - prompt
    enabled: true
