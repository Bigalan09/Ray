schedules:
  - name: memory-curator
    prompt: >
      Review recent memory daily log files (memory/YYYY-MM-DD.md) and update
      MEMORY.md with important long-term facts. Distil, don't just append.
      Remove stale or redundant entries. Keep it under 200 lines.
    agent: curator
    cron: "0 2 * * *"
    enabled: false

