server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://ray-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ray-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only scrape containers on the ray-net network
      - source_labels: [__meta_docker_container_name]
        regex: ".*ray.*"
        action: keep
      # Use container name as the job label
      - source_labels: [__meta_docker_container_name]
        target_label: container
        regex: "/(.*)"
        replacement: "$1"
      # Forward compose service name
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # Forward compose project name
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
    pipeline_stages:
      # Parse JSON log lines emitted by structlog
      - json:
          expressions:
            event: event
            level: level
            req_id: req_id
            correlation_id: correlation_id
            model: model
            agent: agent
            tool: tool
            status: status
            duration_ms: duration_ms
      # Promote parsed fields to Loki labels (kept small — high cardinality fields stay as metadata)
      - labels:
          level:
          service:
      # Use the timestamp from the log line if present
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
