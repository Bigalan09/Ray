providers:
  openai:
    type: openai
    # Credentials come from .env (OPENAI_API_KEY). OPENAI_BASE_URL is optional.
    models:
      - id: gpt-5-nano
        name: GPT-5 nano

  azure:
    type: azure_openai
    # Credentials come from .env (AZURE_OPENAI_API_KEY, AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_VERSION)
    deployments:
      - id: gpt-5-mini
        name: GPT-5 mini
        supports_temperature: false

# The default model used when none is selected.
# Must match a model/deployment id above.
default_model: gpt-5-mini
