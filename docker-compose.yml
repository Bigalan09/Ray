services:
  ray-ui:
    build: ./ui
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - API_URL=http://ray-api:8000
    depends_on:
      ray-api:
        condition: service_healthy
    networks:
      - ray-net

  ray-api:
    build: ./api
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    volumes:
      - ./workspace:/workspace
      - ./config:/config:ro
      - ./workspace-template:/workspace-template:ro
    environment:
      - CHROMA_HOST=ray-chromadb
      - CHROMA_PORT=8000
      - REDIS_URL=redis://ray-redis:6379/0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      - ray-chromadb
      - ray-redis
    networks:
      - ray-net

  ray-chromadb:
    image: chromadb/chroma:latest
    environment:
      - ANONYMIZED_TELEMETRY=False
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - ray-net

  ray-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - ray-net

  ray-worker:
    build: ./api
    command: python -m worker
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://ray-redis:6379/0
      - CHROMA_HOST=ray-chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./workspace:/workspace
      - ./config:/config:ro
      - ./workspace-template:/workspace-template:ro
    depends_on:
      - ray-redis
      - ray-chromadb
    networks:
      - ray-net

  # --- Observability stack ---

  ray-prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - ray-net

  ray-loki:
    image: grafana/loki:3.3.2
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./config/loki.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml
    networks:
      - ray-net

  ray-promtail:
    image: grafana/promtail:3.3.2
    volumes:
      - ./config/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - ray-loki
    networks:
      - ray-net

  ray-grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=ray
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_FEATURE_TOGGLES_ENABLE=lokiExploreLogsEnabled
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - ray-prometheus
      - ray-loki
    networks:
      - ray-net

  # Uncomment for local model inference
  # ray-ollama:
  #   image: ollama/ollama
  #   ports:
  #     - "127.0.0.1:11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   networks:
  #     - ray-net

networks:
  ray-net:
    driver: bridge

volumes:
  chroma-data:
  redis-data:
  prometheus-data:
  loki-data:
  grafana-data:
  # ollama-data:
